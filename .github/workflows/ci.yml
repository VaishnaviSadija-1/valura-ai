name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests (no API key required)
        run: python -m pytest tests/ -v
        env:
          # Explicitly absent: OPENAI_API_KEY, ANTHROPIC_API_KEY
          # Tests must pass with mocked LLM only
          DATABASE_PATH: ":memory:"
